<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análisis Estadístico</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #000;
            margin-bottom: 30px;
            font-size: 2em;
        }

        h2 {
            color: #000;
            margin-top: 40px;
            margin-bottom: 20px;
            border-bottom: 1px solid #000;
            padding-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #000;
            font-weight: bold;
            font-size: 1.2em;
        }

        .error {
            background-color: #fff;
            color: #000;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #000;
            display: none;
        }

        .grafica {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 20px auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        #stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background-color: #fff;
            padding: 15px;
            text-align: center;
            border: 1px solid #000;
        }

        .stat-label {
            font-size: 0.85em;
            color: #000;
            font-weight: bold;
        }

        .stat-value {
            font-size: 1.4em;
            color: #000;
            font-weight: bold;
            margin-top: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        table th {
            background-color: #000;
            color: white;
            padding: 10px;
            text-align: left;
            font-weight: bold;
        }

        table td {
            padding: 10px;
            border-bottom: 1px solid #000;
        }

        .info {
            background-color: #fff;
            padding: 20px;
            margin-top: 30px;
            border: 1px solid #000;
        }

        .info p {
            margin: 8px 0;
            color: #000;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            #stats-container {
                grid-template-columns: repeat(2, 1fr);
            }

            h1 {
                font-size: 1.5em;
            }

            .container {
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            #stats-container {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.85em;
            }

            table th,
            table td {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Análisis</h1>
        
        <div id="loading" class="loading">
            Generando gráficos...
        </div>

        <div id="error" class="error"></div>

        <div id="resultados" style="display: none;">
            <h2>Frecuencias Absolutas</h2>
            <img id="grafica_barras" class="grafica" alt="">

            <h2>Frecuencias Relativas</h2>
            <div class="grid">
                <img id="grafica_pastel" class="grafica" alt="">
                <img id="grafica_polar" class="grafica" alt="">
            </div>

            <h2>Frecuencias Acumuladas</h2>
            <img id="grafica_acumulada" class="grafica" alt="">

            <h2>Polígono de Frecuencias</h2>
            <img id="grafica_poligono" class="grafica" alt="">

            <h2>Estadísticas Descriptivas</h2>
            <div id="stats-container"></div>

            <h2>Tabla de Frecuencias</h2>
            <table>
                <thead>
                    <tr>
                        <th>Color</th>
                        <th>Absoluta</th>
                        <th>Relativa %</th>
                        <th>Acumulada</th>
                        <th>%</th>
                    </tr>
                </thead>
                <tbody id="tabla-body"></tbody>
            </table>

            <div class="info">
                <p><strong>Total:</strong> <span id="total-registros"></span> registros</p>
                <p><strong>Válidos:</strong> <span id="velocidad-valida"></span> registros de velocidad</p>
            </div>
        </div>
    </div>

    <script>
        function ejecutarAnalisis() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const resultados = document.getElementById('resultados');

            loading.style.display = 'block';
            error.style.display = 'none';
            resultados.style.display = 'none';

            fetch('/api/analizar')
                .then(r => r.json())
                .then(data => {
                    if (data.error) throw new Error(data.error);

                    document.getElementById('grafica_barras').src = 'data:image/png;base64,' + data.grafica_barras;
                    document.getElementById('grafica_pastel').src = 'data:image/png;base64,' + data.grafica_pastel;
                    document.getElementById('grafica_polar').src = 'data:image/png;base64,' + data.grafica_polar;
                    document.getElementById('grafica_acumulada').src = 'data:image/png;base64,' + data.grafica_acumulada;
                    document.getElementById('grafica_poligono').src = 'data:image/png;base64,' + data.grafica_poligono;

                    const stats = data.estadisticas;
                    document.getElementById('stats-container').innerHTML = `
                        <div class="stat-box"><div class="stat-label">Media</div><div class="stat-value">${stats.media}</div></div>
                        <div class="stat-box"><div class="stat-label">Mediana</div><div class="stat-value">${stats.mediana}</div></div>
                        <div class="stat-box"><div class="stat-label">Moda</div><div class="stat-value">${stats.moda}</div></div>
                        <div class="stat-box"><div class="stat-label">Desv. Est.</div><div class="stat-value">${stats.desv_std}</div></div>
                        <div class="stat-box"><div class="stat-label">Varianza</div><div class="stat-value">${stats.varianza}</div></div>
                        <div class="stat-box"><div class="stat-label">Mín</div><div class="stat-value">${stats.minimo}</div></div>
                        <div class="stat-box"><div class="stat-label">Máx</div><div class="stat-value">${stats.maximo}</div></div>
                        <div class="stat-box"><div class="stat-label">Rango</div><div class="stat-value">${stats.rango}</div></div>
                    `;

                    let tablaHtml = '';
                    data.tabla.forEach(f => {
                        tablaHtml += `<tr><td><strong>${f.color}</strong></td><td>${f.abs}</td><td>${f.rel}%</td><td>${f.acum}</td><td>${f.pct}%</td></tr>`;
                    });
                    document.getElementById('tabla-body').innerHTML = tablaHtml;

                    document.getElementById('total-registros').textContent = data.total;
                    document.getElementById('velocidad-valida').textContent = data.velocidad_valida;

                    loading.style.display = 'none';
                    resultados.style.display = 'block';
                })
                .catch(err => {
                    error.textContent = '❌ Error: ' + err.message;
                    error.style.display = 'block';
                    loading.style.display = 'none';
                });
        }

        // Ejecutar automáticamente al cargar la página
        window.addEventListener('load', ejecutarAnalisis);
    </script>
</body>
</html>
